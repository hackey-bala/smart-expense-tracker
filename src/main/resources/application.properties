# Server
server.port=${SERVER_PORT:8080}

# H2 Database
spring.datasource.url=jdbc:h2:file:./expense-tracker-db;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Static resources
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# Fraud Detection Settings
fraud.detection.zscore-threshold=2.5
fraud.detection.large-transaction-multiplier=3.0
fraud.detection.suspicious-hour-start=0
fraud.detection.suspicious-hour-end=5

# PDF Export
pdf.export.path=./exports/
